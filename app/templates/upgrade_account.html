{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-center">
    <h2>Upgrade naar Pro-account</h2>
    <p>Met een Pro-account kun je posters toevoegen, analytics bekijken en meer functies gebruiken!</p>

    <form method="POST" action="{{ url_for('main.upgrade_account') }}">
        <button type="submit" class="btn btn-success btn-lg mt-3">Upgrade naar Pro</button>
    </form>

    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary mt-3">Annuleer</a>
</div>
{% endblock %}
