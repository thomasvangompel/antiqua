{% extends "base.html" %}

{% block content %}
<h2>Contacteer {{ seller.business_name or seller.username }}</h2>

<h2>Checkout voor "{{ item.title }}"</h2>

<form method="POST">
  <p>Prijs: €{{ "%.2f"|format(item.price) }}</p>

  <p><strong>Kies betaalmethode:</strong></p>

  <div class="payment-options">
    <label>
      <input type="radio" name="method" value="ideal">
      🏦 iDEAL
    </label><br>

    <label>
      <input type="radio" name="method" value="paypal">
      💳 PayPal
    </label><br>

    <label>
      <input type="radio" name="method" value="bancontact">
      💳 Bancontact
    </label>
  </div>

  <label for="comment">Opmerking (optioneel):</label><br>
  <textarea name="comment"></textarea><br><br>

  <button type="submit">Ga naar betaling</button>
</form>

<a href="{{ url_for('main.public_seller_profile', business_name=seller.business_name) }}">Terug naar profiel</a>
{% endblock %}
